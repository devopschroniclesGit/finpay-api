name: Deploy

on:
  push:
    branches: [main]    # only deploy on merge to main

jobs:
  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: []           # deploy runs independently — CI runs in parallel

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service finpay-api --detach

      - name: Wait for deployment to be live
        run: sleep 30

      - name: Post-deploy health check
        env:
          RAILWAY_URL: ${{ secrets.RAILWAY_URL }}
        run: |
          RESPONSE=$(curl -sf $RAILWAY_URL/api/v1/health)
          echo "Health response: $RESPONSE"
          echo $RESPONSE | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          assert data['success'] == True, 'Deployment health check failed'
          print('✅ Deployment healthy at ${{ secrets.RAILWAY_URL }}')
          "
