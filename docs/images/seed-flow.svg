<svg viewBox="0 0 900 500" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrow-y" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="900" height="500" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">FINPAY API — SEED EXECUTION FLOW (PHASE 9)</text>
  <line x1="80" y1="44" x2="820" y2="44" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="60" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="1">npx prisma db seed  —  safe to run multiple times without duplicating data</text>

  <!-- PHASE A: User loop -->
  <rect x="44" y="72" width="812" height="130" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="62" y="89" fill="#30363d" font-size="8" letter-spacing="1">FOR EACH USER (alice · bob · charlie)</text>

  <!-- upsert decision -->
  <rect x="62" y="96" width="148" height="96" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.2"/>
  <text x="136" y="114" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">upsert</text>
  <text x="136" y="128" text-anchor="middle" fill="#8b949e" font-size="8">WHERE email</text>
  <line x1="62" y1="134" x2="210" y2="134" stroke="#30363d" stroke-width="0.6"/>
  <text x="72" y="150" fill="#8b949e" font-size="8">First run:</text>
  <text x="72" y="164" fill="#4ade80" font-size="8">CREATE user + account</text>
  <text x="72" y="178" fill="#4ade80" font-size="8">balance seeded</text>

  <line x1="210" y1="144" x2="232" y2="144" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- first run path -->
  <rect x="232" y="96" width="172" height="96" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1"/>
  <text x="318" y="114" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">CREATE (first run)</text>
  <line x1="232" y1="120" x2="404" y2="120" stroke="#30363d" stroke-width="0.6"/>
  <text x="242" y="136" fill="#8b949e" font-size="8">user.create</text>
  <text x="242" y="150" fill="#8b949e" font-size="8">account.create</text>
  <text x="242" y="164" fill="#8b949e" font-size="8">  balance: R10k / 5k / 2.5k</text>
  <text x="242" y="178" fill="#8b949e" font-size="8">  currency: ZAR</text>

  <!-- OR separator -->
  <text x="424" y="148" text-anchor="middle" fill="#30363d" font-size="9">OR</text>

  <!-- re-run path -->
  <rect x="442" y="96" width="200" height="96" rx="6" fill="#161b22" stroke="#fbbf24" stroke-width="1"/>
  <text x="542" y="114" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">UPDATE (re-run)</text>
  <line x1="442" y1="120" x2="642" y2="120" stroke="#30363d" stroke-width="0.6"/>
  <text x="452" y="136" fill="#8b949e" font-size="8">user found by email</text>
  <text x="452" y="150" fill="#8b949e" font-size="8">account.update:</text>
  <text x="452" y="164" fill="#8b949e" font-size="8">  balance reset to seed value</text>
  <text x="452" y="178" fill="#fbbf24" font-size="8">  no duplicate user created</text>

  <!-- bcrypt note -->
  <rect x="658" y="96" width="186" height="96" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="751" y="114" text-anchor="middle" fill="#8b949e" font-size="9" font-weight="bold">bcrypt.hash(pw, 12)</text>
  <line x1="658" y1="120" x2="844" y2="120" stroke="#30363d" stroke-width="0.6"/>
  <text x="668" y="136" fill="#8b949e" font-size="8">runs BEFORE upsert</text>
  <text x="668" y="150" fill="#8b949e" font-size="8">cost factor 12 = ~300ms</text>
  <text x="668" y="164" fill="#8b949e" font-size="8">× 3 users = ~900ms hashing</text>
  <text x="668" y="178" fill="#8b949e" font-size="8">expected — not a bug</text>

  <line x1="450" y1="202" x2="450" y2="220" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PHASE B: Transaction cleanup -->
  <rect x="44" y="220" width="812" height="72" rx="6" fill="#161b22" stroke="#f87171" stroke-width="1.2"/>
  <rect x="44" y="220" width="812" height="24" rx="6" fill="#1e1010"/>
  <rect x="44" y="236" width="812" height="8" fill="#1e1010"/>
  <text x="450" y="235" text-anchor="middle" fill="#f87171" font-size="10" font-weight="bold">SAFE CLEANUP — deleteMany WHERE idempotencyKey STARTS WITH "seed-"</text>
  <line x1="44" y1="244" x2="856" y2="244" stroke="#f87171" stroke-width="0.8"/>
  <text x="58" y="260" fill="#8b949e" font-size="8.5">Deletes only previously seeded transactions · user-created transactions (no seed- prefix) are never touched</text>
  <text x="58" y="276" fill="#8b949e" font-size="8.5">Runs before creating new transactions — ensures clean state on re-seed without wiping live demo data</text>

  <line x1="450" y1="292" x2="450" y2="310" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PHASE C: Transactions -->
  <rect x="44" y="310" width="812" height="90" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="62" y="327" fill="#30363d" font-size="8" letter-spacing="1">FOR EACH TRANSACTION (seed-tx-001 → seed-tx-006)</text>

  <rect x="62" y="334" width="210" height="58" rx="4" fill="#161b22" stroke="#4ade80" stroke-width="1"/>
  <text x="167" y="350" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">transaction.create</text>
  <text x="72" y="366" fill="#8b949e" font-size="8">status: COMPLETED</text>
  <text x="72" y="380" fill="#8b949e" font-size="8">currency: ZAR</text>

  <rect x="286" y="334" width="210" height="58" rx="4" fill="#161b22" stroke="#fbbf24" stroke-width="1"/>
  <text x="391" y="350" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">createdAt override</text>
  <text x="296" y="366" fill="#8b949e" font-size="8">randomDate(daysAgo) generates</text>
  <text x="296" y="380" fill="#8b949e" font-size="8">a past timestamp (2–28 days)</text>

  <rect x="510" y="334" width="210" height="58" rx="4" fill="#161b22" stroke="#c084fc" stroke-width="1"/>
  <text x="615" y="350" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="bold">idempotencyKey prefix</text>
  <text x="520" y="366" fill="#8b949e" font-size="8">seed-tx-001 → seed-tx-006</text>
  <text x="520" y="380" fill="#8b949e" font-size="8">prefix is the cleanup selector</text>

  <rect x="734" y="334" width="110" height="58" rx="4" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="789" y="355" text-anchor="middle" fill="#8b949e" font-size="8.5">balances NOT</text>
  <text x="789" y="369" text-anchor="middle" fill="#8b949e" font-size="8.5">adjusted by seed</text>
  <text x="789" y="383" text-anchor="middle" fill="#8b949e" font-size="7.5">(set directly on accounts)</text>

  <line x1="450" y1="400" x2="450" y2="416" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SUMMARY -->
  <rect x="44" y="416" width="812" height="52" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.2"/>
  <text x="58" y="434" fill="#4ade80" font-size="9" font-weight="bold">SUMMARY LOG</text>
  <line x1="44" y1="440" x2="856" y2="440" stroke="#30363d" stroke-width="0.6"/>
  <text x="58" y="456" fill="#8b949e" font-size="8.5">Users: 3   Transactions: 6   All passwords: SecurePass123   Server: npm run dev   Docs: http://localhost:3000/api/docs</text>

  <text x="820" y="488" text-anchor="end" fill="#30363d" font-size="8">seed-flow.svg</text>
</svg>
