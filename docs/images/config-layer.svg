<svg viewBox="0 0 900 480" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-y" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
  </defs>

  <rect width="900" height="480" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">FINPAY API — CONFIGURATION LAYER (PHASE 4)</text>
  <line x1="80" y1="44" x2="820" y2="44" stroke="#30363d" stroke-width="1"/>

  <!-- ORDER label -->
  <text x="450" y="66" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="2">INITIALISATION ORDER: logger → redis → database     (each depends on the previous)</text>

  <!-- ─── STEP 1: LOGGER ─── -->
  <rect x="44" y="80" width="252" height="230" rx="8" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="44" y="80" width="252" height="28" rx="8" fill="#1a3a2a"/>
  <rect x="44" y="100" width="252" height="8" fill="#1a3a2a"/>
  <text x="170" y="99" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">1. src/config/logger.js</text>
  <line x1="44" y1="108" x2="296" y2="108" stroke="#4ade80" stroke-width="0.8"/>

  <text x="58" y="126" fill="#8b949e" font-size="9">Library</text><text x="282" y="126" text-anchor="end" fill="#e6edf3" font-size="9">winston</text>
  <text x="58" y="142" fill="#8b949e" font-size="9">Format (dev)</text><text x="282" y="142" text-anchor="end" fill="#e6edf3" font-size="9">colorize + simple</text>
  <text x="58" y="158" fill="#8b949e" font-size="9">Format (prod)</text><text x="282" y="158" text-anchor="end" fill="#e6edf3" font-size="9">timestamp + JSON</text>
  <line x1="44" y1="166" x2="296" y2="166" stroke="#30363d" stroke-width="0.6"/>
  <text x="58" y="182" fill="#8b949e" font-size="9">Transport 1</text><text x="282" y="182" text-anchor="end" fill="#e6edf3" font-size="9">Console</text>
  <text x="58" y="198" fill="#8b949e" font-size="9">Transport 2</text><text x="282" y="198" text-anchor="end" fill="#e6edf3" font-size="9">logs/error.log (errors only)</text>
  <text x="58" y="214" fill="#8b949e" font-size="9">Transport 3</text><text x="282" y="214" text-anchor="end" fill="#e6edf3" font-size="9">logs/combined.log (all)</text>
  <line x1="44" y1="222" x2="296" y2="222" stroke="#30363d" stroke-width="0.6"/>
  <text x="58" y="238" fill="#8b949e" font-size="9">Rotation</text><text x="282" y="238" text-anchor="end" fill="#e6edf3" font-size="9">10MB max, 5–10 files</text>
  <text x="58" y="254" fill="#8b949e" font-size="9">Default meta</text><text x="282" y="254" text-anchor="end" fill="#e6edf3" font-size="9">service, environment</text>
  <line x1="44" y1="262" x2="296" y2="262" stroke="#30363d" stroke-width="0.6"/>
  <text x="58" y="280" fill="#4ade80" font-size="8.5">Used by Redis and Database</text>
  <text x="58" y="295" fill="#4ade80" font-size="8.5">configs to report status</text>

  <!-- ─── STEP 2: REDIS ─── -->
  <rect x="324" y="80" width="252" height="230" rx="8" fill="#161b22" stroke="#fbbf24" stroke-width="1.5"/>
  <rect x="324" y="80" width="252" height="28" rx="8" fill="#2a2010"/>
  <rect x="324" y="100" width="252" height="8" fill="#2a2010"/>
  <text x="450" y="99" text-anchor="middle" fill="#fbbf24" font-size="11" font-weight="bold">2. src/config/redis.js</text>
  <line x1="324" y1="108" x2="576" y2="108" stroke="#fbbf24" stroke-width="0.8"/>

  <text x="338" y="126" fill="#8b949e" font-size="9">Library</text><text x="562" y="126" text-anchor="end" fill="#e6edf3" font-size="9">ioredis</text>
  <text x="338" y="142" fill="#8b949e" font-size="9">URL</text><text x="562" y="142" text-anchor="end" fill="#e6edf3" font-size="9">REDIS_URL env var</text>
  <text x="338" y="158" fill="#8b949e" font-size="9">maxRetries</text><text x="562" y="158" text-anchor="end" fill="#e6edf3" font-size="9">3 per request</text>
  <line x1="324" y1="166" x2="576" y2="166" stroke="#30363d" stroke-width="0.6"/>
  <text x="338" y="182" fill="#8b949e" font-size="9">Event: connect</text><text x="562" y="182" text-anchor="end" fill="#fbbf24" font-size="9">logger.info</text>
  <text x="338" y="198" fill="#8b949e" font-size="9">Event: ready</text><text x="562" y="198" text-anchor="end" fill="#fbbf24" font-size="9">logger.info</text>
  <text x="338" y="214" fill="#8b949e" font-size="9">Event: error</text><text x="562" y="214" text-anchor="end" fill="#fbbf24" font-size="9">logger.error</text>
  <text x="338" y="230" fill="#8b949e" font-size="9">Event: close</text><text x="562" y="230" text-anchor="end" fill="#fbbf24" font-size="9">logger.warn</text>
  <line x1="324" y1="238" x2="576" y2="238" stroke="#30363d" stroke-width="0.6"/>
  <text x="338" y="254" fill="#8b949e" font-size="9">Retry backoff</text><text x="562" y="254" text-anchor="end" fill="#e6edf3" font-size="9">200ms · 400ms · 2000ms</text>
  <line x1="324" y1="262" x2="576" y2="262" stroke="#30363d" stroke-width="0.6"/>
  <text x="338" y="280" fill="#fbbf24" font-size="8.5">Exports: redis (default)</text>
  <text x="338" y="295" fill="#fbbf24" font-size="8.5">         disconnectRedis()</text>

  <!-- ─── STEP 3: DATABASE ─── -->
  <rect x="604" y="80" width="252" height="230" rx="8" fill="#161b22" stroke="#60a5fa" stroke-width="1.5"/>
  <rect x="604" y="80" width="252" height="28" rx="8" fill="#10203a"/>
  <rect x="604" y="100" width="252" height="8" fill="#10203a"/>
  <text x="730" y="99" text-anchor="middle" fill="#60a5fa" font-size="11" font-weight="bold">3. src/config/database.js</text>
  <line x1="604" y1="108" x2="856" y2="108" stroke="#60a5fa" stroke-width="0.8"/>

  <text x="618" y="126" fill="#8b949e" font-size="9">Library</text><text x="842" y="126" text-anchor="end" fill="#e6edf3" font-size="9">@prisma/client</text>
  <text x="618" y="142" fill="#8b949e" font-size="9">Version</text><text x="842" y="142" text-anchor="end" fill="#e6edf3" font-size="9">Prisma 5 (downgraded)</text>
  <text x="618" y="158" fill="#8b949e" font-size="9">Log routing</text><text x="842" y="158" text-anchor="end" fill="#e6edf3" font-size="9">all events → Winston</text>
  <line x1="604" y1="166" x2="856" y2="166" stroke="#30363d" stroke-width="0.6"/>
  <text x="618" y="182" fill="#8b949e" font-size="9">Event: query</text><text x="842" y="182" text-anchor="end" fill="#60a5fa" font-size="9">logger.debug (dev only)</text>
  <text x="618" y="198" fill="#8b949e" font-size="9">Event: warn</text><text x="842" y="198" text-anchor="end" fill="#60a5fa" font-size="9">logger.warn</text>
  <text x="618" y="214" fill="#8b949e" font-size="9">Event: error</text><text x="842" y="214" text-anchor="end" fill="#60a5fa" font-size="9">logger.error</text>
  <text x="618" y="230" fill="#8b949e" font-size="9">Query timing</text><text x="842" y="230" text-anchor="end" fill="#e6edf3" font-size="9">e.duration ms logged</text>
  <line x1="604" y1="238" x2="856" y2="238" stroke="#30363d" stroke-width="0.6"/>
  <text x="618" y="254" fill="#8b949e" font-size="9">Connection</text><text x="842" y="254" text-anchor="end" fill="#e6edf3" font-size="9">DATABASE_URL env var</text>
  <line x1="604" y1="262" x2="856" y2="262" stroke="#30363d" stroke-width="0.6"/>
  <text x="618" y="280" fill="#60a5fa" font-size="8.5">Exports: prisma (default)</text>
  <text x="618" y="295" fill="#60a5fa" font-size="8.5">         disconnectDatabase()</text>

  <!-- Dependency arrows -->
  <line x1="296" y1="188" x2="323" y2="188" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="310" y="183" text-anchor="middle" fill="#4ade80" font-size="8">imports</text>
  <line x1="576" y1="188" x2="603" y2="188" stroke="#fbbf24" stroke-width="1.5" marker-end="url(#arrow-y)"/>
  <text x="590" y="183" text-anchor="middle" fill="#fbbf24" font-size="8">imports</text>

  <!-- ─── UTILITIES ROW ─── -->
  <text x="450" y="342" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="2">PHASE 5 — UTILITIES (imported by every controller)</text>

  <rect x="120" y="356" width="278" height="96" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="259" y="374" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="bold">src/utils/response.js</text>
  <line x1="120" y1="380" x2="398" y2="380" stroke="#30363d" stroke-width="0.6"/>
  <text x="134" y="396" fill="#8b949e" font-size="8.5">success(res, data, message, statusCode)</text>
  <text x="134" y="412" fill="#8b949e" font-size="8.5">error(res, message, statusCode, errors)</text>
  <text x="134" y="428" fill="#8b949e" font-size="8.5">paginated(res, data, pagination, message)</text>
  <text x="134" y="444" fill="#4ade80" font-size="8">Consistent shape on every endpoint</text>

  <rect x="502" y="356" width="278" height="96" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <text x="641" y="374" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="bold">src/utils/asyncHandler.js</text>
  <line x1="502" y1="380" x2="780" y2="380" stroke="#30363d" stroke-width="0.6"/>
  <text x="516" y="396" fill="#8b949e" font-size="8.5">asyncHandler(fn) → (req, res, next) =></text>
  <text x="516" y="412" fill="#8b949e" font-size="8.5">Promise.resolve(fn).catch(next)</text>
  <text x="516" y="428" fill="#8b949e" font-size="8.5">Eliminates try/catch in every controller</text>
  <text x="516" y="444" fill="#4ade80" font-size="8">Errors auto-forwarded to errorHandler</text>

  <line x1="80" y1="465" x2="820" y2="465" stroke="#30363d" stroke-width="1"/>
  <text x="862" y="475" text-anchor="end" fill="#30363d" font-size="8">config-layer.svg</text>
</svg>
