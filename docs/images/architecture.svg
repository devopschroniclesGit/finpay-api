<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#60a5fa"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#fbbf24"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">FINPAY API — SYSTEM ARCHITECTURE</text>
  <line x1="120" y1="46" x2="780" y2="46" stroke="#30363d" stroke-width="1"/>

  <!-- ─── MAIN FLOW COLUMN ─── -->

  <!-- CLIENT -->
  <rect x="330" y="62" width="240" height="44" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="80" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">CLIENT</text>
  <text x="450" y="96" text-anchor="middle" fill="#8b949e" font-size="9">HTTP Request (REST / curl / Swagger)</text>

  <!-- Arrow: Client → Router -->
  <line x1="450" y1="106" x2="450" y2="128" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- EXPRESS ROUTER -->
  <rect x="285" y="128" width="330" height="44" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="147" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">EXPRESS ROUTER</text>
  <text x="450" y="162" text-anchor="middle" fill="#8b949e" font-size="9">Routes: /auth · /accounts · /transactions · /health</text>

  <!-- Arrow: Router → Middleware -->
  <line x1="450" y1="172" x2="450" y2="194" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- MIDDLEWARE BLOCK -->
  <rect x="260" y="194" width="380" height="100" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="450" y="211" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="1">MIDDLEWARE PIPELINE</text>

  <rect x="272" y="218" width="106" height="32" rx="4" fill="#1a2233" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="325" y="231" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">JWT AUTH</text>
  <text x="325" y="243" text-anchor="middle" fill="#8b949e" font-size="8">verify token</text>

  <rect x="397" y="218" width="106" height="32" rx="4" fill="#1a2233" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="450" y="231" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">RATE LIMITER</text>
  <text x="450" y="243" text-anchor="middle" fill="#8b949e" font-size="8">Redis-backed</text>

  <rect x="522" y="218" width="106" height="32" rx="4" fill="#1a2233" stroke="#c084fc" stroke-width="1.2"/>
  <text x="575" y="231" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="bold">IDEMPOTENCY</text>
  <text x="575" y="243" text-anchor="middle" fill="#8b949e" font-size="8">deduplicate keys</text>

  <!-- Arrow inside middleware row -->
  <line x1="378" y1="234" x2="396" y2="234" stroke="#4ade80" stroke-width="1" marker-end="url(#arrow)"/>
  <line x1="503" y1="234" x2="521" y2="234" stroke="#4ade80" stroke-width="1" marker-end="url(#arrow)"/>

  <!-- Cache check label inside middleware block -->
  <text x="450" y="278" text-anchor="middle" fill="#8b949e" font-size="8.5">Cache Check (Redis hit? return early)</text>

  <!-- Arrow: Middleware → Service -->
  <line x1="450" y1="294" x2="450" y2="316" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- SERVICE LAYER -->
  <rect x="285" y="316" width="330" height="44" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="335" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">SERVICE LAYER</text>
  <text x="450" y="350" text-anchor="middle" fill="#8b949e" font-size="9">Business logic: auth · wallet · transfer · audit</text>

  <!-- Arrow: Service → Prisma -->
  <line x1="450" y1="360" x2="450" y2="382" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PRISMA ORM -->
  <rect x="305" y="382" width="290" height="44" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="401" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">PRISMA ORM</text>
  <text x="450" y="416" text-anchor="middle" fill="#8b949e" font-size="9">Type-safe queries · $transaction (atomic)</text>

  <!-- Arrow: Prisma → PostgreSQL -->
  <line x1="450" y1="426" x2="450" y2="448" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- POSTGRESQL -->
  <rect x="305" y="448" width="290" height="52" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="2"/>
  <text x="450" y="468" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">POSTGRESQL 15</text>
  <text x="450" y="483" text-anchor="middle" fill="#8b949e" font-size="9">users · accounts · transactions · audit_logs</text>
  <text x="450" y="495" text-anchor="middle" fill="#4ade80" font-size="8">[ persistent store ]</text>

  <!-- ─── REDIS SIDE PANEL ─── -->
  <rect x="36" y="194" width="196" height="220" rx="8" fill="#0d1117" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="134" y="213" text-anchor="middle" fill="#fbbf24" font-size="10" font-weight="bold" letter-spacing="1">REDIS 7</text>

  <rect x="50" y="220" width="168" height="34" rx="4" fill="#1a2233" stroke="#fbbf24" stroke-width="1"/>
  <text x="134" y="234" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">Rate Limit Store</text>
  <text x="134" y="247" text-anchor="middle" fill="#8b949e" font-size="8">sliding window counters</text>

  <rect x="50" y="262" width="168" height="34" rx="4" fill="#1a2233" stroke="#fbbf24" stroke-width="1"/>
  <text x="134" y="276" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">Idempotency Store</text>
  <text x="134" y="289" text-anchor="middle" fill="#8b949e" font-size="8">keyed request cache (TTL)</text>

  <rect x="50" y="304" width="168" height="34" rx="4" fill="#1a2233" stroke="#fbbf24" stroke-width="1"/>
  <text x="134" y="318" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">Response Cache</text>
  <text x="134" y="331" text-anchor="middle" fill="#8b949e" font-size="8">balance / account reads</text>

  <rect x="50" y="346" width="168" height="34" rx="4" fill="#1a2233" stroke="#fbbf24" stroke-width="1"/>
  <text x="134" y="360" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">Session / Token TTL</text>
  <text x="134" y="373" text-anchor="middle" fill="#8b949e" font-size="8">JWT blacklist (logout)</text>

  <!-- Redis connector to middleware -->
  <line x1="232" y1="304" x2="260" y2="234" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-yellow)"/>

  <!-- ─── WINSTON SIDE PANEL ─── -->
  <rect x="668" y="194" width="196" height="220" rx="8" fill="#0d1117" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="766" y="213" text-anchor="middle" fill="#60a5fa" font-size="10" font-weight="bold" letter-spacing="1">WINSTON LOGGER</text>

  <rect x="682" y="220" width="168" height="34" rx="4" fill="#1a2233" stroke="#60a5fa" stroke-width="1"/>
  <text x="766" y="234" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">HTTP Request Log</text>
  <text x="766" y="247" text-anchor="middle" fill="#8b949e" font-size="8">morgan → winston stream</text>

  <rect x="682" y="262" width="168" height="34" rx="4" fill="#1a2233" stroke="#60a5fa" stroke-width="1"/>
  <text x="766" y="276" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">Audit Trail</text>
  <text x="766" y="289" text-anchor="middle" fill="#8b949e" font-size="8">append-only tx events</text>

  <rect x="682" y="304" width="168" height="34" rx="4" fill="#1a2233" stroke="#60a5fa" stroke-width="1"/>
  <text x="766" y="318" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">Error Log</text>
  <text x="766" y="331" text-anchor="middle" fill="#8b949e" font-size="8">structured JSON errors</text>

  <rect x="682" y="346" width="168" height="34" rx="4" fill="#1a2233" stroke="#60a5fa" stroke-width="1"/>
  <text x="766" y="360" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">Log Files</text>
  <text x="766" y="373" text-anchor="middle" fill="#8b949e" font-size="8">logs/app.log · error.log</text>

  <!-- Winston connector to service layer -->
  <line x1="668" y1="340" x2="615" y2="340" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrow-blue)"/>

  <!-- ─── DOCKER COMPOSE CALLOUT ─── -->
  <rect x="36" y="448" width="196" height="60" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="134" y="466" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="1">DOCKER COMPOSE</text>
  <text x="134" y="482" text-anchor="middle" fill="#8b949e" font-size="8.5">finpay_postgres :5432</text>
  <text x="134" y="495" text-anchor="middle" fill="#8b949e" font-size="8.5">finpay_redis     :6379</text>

  <!-- SWAGGER DOC CALLOUT -->
  <rect x="668" y="448" width="196" height="60" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1"/>
  <text x="766" y="466" text-anchor="middle" fill="#8b949e" font-size="9" letter-spacing="1">SWAGGER / OPENAPI 3</text>
  <text x="766" y="482" text-anchor="middle" fill="#8b949e" font-size="8.5">GET /api/docs</text>
  <text x="766" y="495" text-anchor="middle" fill="#8b949e" font-size="8.5">Interactive API explorer</text>

  <!-- ─── LEGEND ─── -->
  <line x1="36" y1="540" x2="864" y2="540" stroke="#30363d" stroke-width="1"/>
  <text x="54" y="557" fill="#4ade80" font-size="9">— Primary flow</text>
  <line x1="54" y1="568" x2="100" y2="568" stroke="#fbbf24" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="106" y="572" fill="#fbbf24" font-size="9">Redis side-channel</text>
  <line x1="220" y1="568" x2="266" y2="568" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="272" y="572" fill="#60a5fa" font-size="9">Logger side-channel</text>
  <text x="450" y="572" text-anchor="middle" fill="#30363d" font-size="8">Stack: Node.js · Express · PostgreSQL · Redis · Prisma · Docker</text>
  <text x="854" y="610" text-anchor="end" fill="#30363d" font-size="8">FinPay API — architecture.svg</text>
</svg>
