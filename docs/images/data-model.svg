<svg viewBox="0 0 900 520" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#4ade80"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="520" fill="#0d1117"/>

  <!-- Title -->
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">FINPAY API — DATA MODEL</text>
  <line x1="120" y1="44" x2="780" y2="44" stroke="#30363d" stroke-width="1"/>

  <!-- ─── USER ─── -->
  <rect x="44" y="60" width="200" height="210" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="44" y="60" width="200" height="28" rx="6" fill="#1a3a2a"/>
  <rect x="44" y="80" width="200" height="8" fill="#1a3a2a"/>
  <text x="144" y="79" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">User</text>
  <line x1="44" y1="88" x2="244" y2="88" stroke="#4ade80" stroke-width="0.8"/>
  <text x="58" y="104" fill="#8b949e" font-size="9">id</text><text x="200" y="104" text-anchor="end" fill="#e6edf3" font-size="9">uuid (PK)</text>
  <text x="58" y="120" fill="#8b949e" font-size="9">email</text><text x="200" y="120" text-anchor="end" fill="#e6edf3" font-size="9">String UNIQUE</text>
  <text x="58" y="136" fill="#8b949e" font-size="9">passwordHash</text><text x="200" y="136" text-anchor="end" fill="#e6edf3" font-size="9">String</text>
  <text x="58" y="152" fill="#8b949e" font-size="9">firstName</text><text x="200" y="152" text-anchor="end" fill="#e6edf3" font-size="9">String</text>
  <text x="58" y="168" fill="#8b949e" font-size="9">lastName</text><text x="200" y="168" text-anchor="end" fill="#e6edf3" font-size="9">String</text>
  <text x="58" y="184" fill="#8b949e" font-size="9">isActive</text><text x="200" y="184" text-anchor="end" fill="#e6edf3" font-size="9">Boolean</text>
  <text x="58" y="200" fill="#8b949e" font-size="9">createdAt</text><text x="200" y="200" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <text x="58" y="216" fill="#8b949e" font-size="9">updatedAt</text><text x="200" y="216" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <line x1="44" y1="226" x2="244" y2="226" stroke="#30363d" stroke-width="0.8"/>
  <text x="58" y="242" fill="#60a5fa" font-size="9">account</text><text x="200" y="242" text-anchor="end" fill="#60a5fa" font-size="9">Account?</text>
  <text x="58" y="258" fill="#60a5fa" font-size="9">auditLogs</text><text x="200" y="258" text-anchor="end" fill="#60a5fa" font-size="9">AuditLog[]</text>

  <!-- ─── ACCOUNT ─── -->
  <rect x="330" y="60" width="240" height="218" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="330" y="60" width="240" height="28" rx="6" fill="#1a3a2a"/>
  <rect x="330" y="80" width="240" height="8" fill="#1a3a2a"/>
  <text x="450" y="79" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Account</text>
  <line x1="330" y1="88" x2="570" y2="88" stroke="#4ade80" stroke-width="0.8"/>
  <text x="344" y="104" fill="#8b949e" font-size="9">id</text><text x="556" y="104" text-anchor="end" fill="#e6edf3" font-size="9">uuid (PK)</text>
  <text x="344" y="120" fill="#8b949e" font-size="9">userId</text><text x="556" y="120" text-anchor="end" fill="#e6edf3" font-size="9">String UNIQUE (FK)</text>
  <text x="344" y="136" fill="#8b949e" font-size="9">balance</text><text x="556" y="136" text-anchor="end" fill="#e6edf3" font-size="9">Decimal(18,2)</text>
  <text x="344" y="152" fill="#8b949e" font-size="9">currency</text><text x="556" y="152" text-anchor="end" fill="#e6edf3" font-size="9">String (ZAR)</text>
  <text x="344" y="168" fill="#8b949e" font-size="9">createdAt</text><text x="556" y="168" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <text x="344" y="184" fill="#8b949e" font-size="9">updatedAt</text><text x="556" y="184" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <line x1="330" y1="194" x2="570" y2="194" stroke="#30363d" stroke-width="0.8"/>
  <text x="344" y="210" fill="#60a5fa" font-size="9">user</text><text x="556" y="210" text-anchor="end" fill="#60a5fa" font-size="9">User</text>
  <text x="344" y="226" fill="#60a5fa" font-size="9">sentTx</text><text x="556" y="226" text-anchor="end" fill="#60a5fa" font-size="9">Transaction[] (sender)</text>
  <text x="344" y="242" fill="#60a5fa" font-size="9">receivedTx</text><text x="556" y="242" text-anchor="end" fill="#60a5fa" font-size="9">Transaction[] (receiver)</text>
  <text x="344" y="258" fill="#30363d" font-size="8" font-style="italic">@@map("accounts")</text>

  <!-- ─── TRANSACTION ─── -->
  <rect x="620" y="60" width="242" height="252" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <rect x="620" y="60" width="242" height="28" rx="6" fill="#1a3a2a"/>
  <rect x="620" y="80" width="242" height="8" fill="#1a3a2a"/>
  <text x="741" y="79" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">Transaction</text>
  <line x1="620" y1="88" x2="862" y2="88" stroke="#4ade80" stroke-width="0.8"/>
  <text x="634" y="104" fill="#8b949e" font-size="9">id</text><text x="848" y="104" text-anchor="end" fill="#e6edf3" font-size="9">uuid (PK)</text>
  <text x="634" y="120" fill="#8b949e" font-size="9">senderId</text><text x="848" y="120" text-anchor="end" fill="#e6edf3" font-size="9">String (FK)</text>
  <text x="634" y="136" fill="#8b949e" font-size="9">receiverId</text><text x="848" y="136" text-anchor="end" fill="#e6edf3" font-size="9">String (FK)</text>
  <text x="634" y="152" fill="#8b949e" font-size="9">amount</text><text x="848" y="152" text-anchor="end" fill="#e6edf3" font-size="9">Decimal(18,2)</text>
  <text x="634" y="168" fill="#8b949e" font-size="9">currency</text><text x="848" y="168" text-anchor="end" fill="#e6edf3" font-size="9">String</text>
  <text x="634" y="184" fill="#8b949e" font-size="9">status</text><text x="848" y="184" text-anchor="end" fill="#e6edf3" font-size="9">PENDING·COMPLETED·FAILED</text>
  <text x="634" y="200" fill="#8b949e" font-size="9">reference</text><text x="848" y="200" text-anchor="end" fill="#e6edf3" font-size="9">String UNIQUE</text>
  <text x="634" y="216" fill="#8b949e" font-size="9">idempotencyKey</text><text x="848" y="216" text-anchor="end" fill="#e6edf3" font-size="9">String? UNIQUE</text>
  <text x="634" y="232" fill="#8b949e" font-size="9">description</text><text x="848" y="232" text-anchor="end" fill="#e6edf3" font-size="9">String?</text>
  <text x="634" y="248" fill="#8b949e" font-size="9">createdAt</text><text x="848" y="248" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <line x1="620" y1="258" x2="862" y2="258" stroke="#30363d" stroke-width="0.8"/>
  <text x="634" y="274" fill="#60a5fa" font-size="9">sender</text><text x="848" y="274" text-anchor="end" fill="#60a5fa" font-size="9">Account</text>
  <text x="634" y="290" fill="#60a5fa" font-size="9">receiver</text><text x="848" y="290" text-anchor="end" fill="#60a5fa" font-size="9">Account</text>
  <text x="634" y="302" fill="#30363d" font-size="8" font-style="italic">@@map("transactions")</text>

  <!-- ─── AUDIT LOG ─── -->
  <rect x="44" y="320" width="200" height="160" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <rect x="44" y="320" width="200" height="28" rx="6" fill="#1a2030"/>
  <rect x="44" y="340" width="200" height="8" fill="#1a2030"/>
  <text x="144" y="339" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="bold">AuditLog</text>
  <line x1="44" y1="348" x2="244" y2="348" stroke="#30363d" stroke-width="0.8"/>
  <text x="58" y="364" fill="#8b949e" font-size="9">id</text><text x="230" y="364" text-anchor="end" fill="#e6edf3" font-size="9">uuid (PK)</text>
  <text x="58" y="380" fill="#8b949e" font-size="9">userId</text><text x="230" y="380" text-anchor="end" fill="#e6edf3" font-size="9">String (FK)</text>
  <text x="58" y="396" fill="#8b949e" font-size="9">action</text><text x="230" y="396" text-anchor="end" fill="#e6edf3" font-size="9">String</text>
  <text x="58" y="412" fill="#8b949e" font-size="9">metadata</text><text x="230" y="412" text-anchor="end" fill="#e6edf3" font-size="9">Json?</text>
  <text x="58" y="428" fill="#8b949e" font-size="9">ipAddress</text><text x="230" y="428" text-anchor="end" fill="#e6edf3" font-size="9">String?</text>
  <text x="58" y="444" fill="#8b949e" font-size="9">createdAt</text><text x="230" y="444" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <line x1="44" y1="454" x2="244" y2="454" stroke="#30363d" stroke-width="0.8"/>
  <text x="58" y="469" fill="#60a5fa" font-size="9">user</text><text x="230" y="469" text-anchor="end" fill="#60a5fa" font-size="9">User</text>

  <!-- ─── IDEMPOTENCY KEY ─── -->
  <rect x="330" y="320" width="240" height="148" rx="6" fill="#161b22" stroke="#c084fc" stroke-width="1.2"/>
  <rect x="330" y="320" width="240" height="28" rx="6" fill="#1e1a30"/>
  <rect x="330" y="340" width="240" height="8" fill="#1e1a30"/>
  <text x="450" y="339" text-anchor="middle" fill="#c084fc" font-size="11" font-weight="bold">IdempotencyKey</text>
  <line x1="330" y1="348" x2="570" y2="348" stroke="#c084fc" stroke-width="0.8"/>
  <text x="344" y="364" fill="#8b949e" font-size="9">id</text><text x="556" y="364" text-anchor="end" fill="#e6edf3" font-size="9">uuid (PK)</text>
  <text x="344" y="380" fill="#8b949e" font-size="9">key</text><text x="556" y="380" text-anchor="end" fill="#e6edf3" font-size="9">String UNIQUE</text>
  <text x="344" y="396" fill="#8b949e" font-size="9">response</text><text x="556" y="396" text-anchor="end" fill="#e6edf3" font-size="9">Json</text>
  <text x="344" y="412" fill="#8b949e" font-size="9">statusCode</text><text x="556" y="412" text-anchor="end" fill="#e6edf3" font-size="9">Int</text>
  <text x="344" y="428" fill="#8b949e" font-size="9">expiresAt</text><text x="556" y="428" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <text x="344" y="444" fill="#8b949e" font-size="9">createdAt</text><text x="556" y="444" text-anchor="end" fill="#e6edf3" font-size="9">DateTime</text>
  <text x="344" y="458" fill="#30363d" font-size="8" font-style="italic">Redis mirror (TTL) + DB record</text>

  <!-- ─── RELATIONSHIPS ─── -->

  <!-- User → Account (1-to-1) -->
  <line x1="244" y1="165" x2="330" y2="165" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="287" y="158" text-anchor="middle" fill="#4ade80" font-size="8">1</text>
  <text x="287" y="178" text-anchor="middle" fill="#4ade80" font-size="8">1</text>

  <!-- Account → Transaction (sender) -->
  <line x1="570" y1="150" x2="620" y2="150" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="594" y="144" text-anchor="middle" fill="#4ade80" font-size="8">1</text>
  <text x="594" y="164" text-anchor="middle" fill="#4ade80" font-size="8">*</text>

  <!-- Account → Transaction (receiver) -->
  <line x1="570" y1="180" x2="620" y2="180" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- User → AuditLog (1-to-many) -->
  <line x1="144" y1="270" x2="144" y2="320" stroke="#4ade80" stroke-width="1.2" marker-end="url(#arrow)"/>
  <text x="152" y="296" fill="#4ade80" font-size="8">1</text>
  <text x="152" y="316" fill="#4ade80" font-size="8">*</text>

  <!-- Idempotency label note -->
  <text x="450" y="490" text-anchor="middle" fill="#c084fc" font-size="8">Keyed by client header X-Idempotency-Key</text>

  <!-- Legend -->
  <line x1="44" y1="504" x2="856" y2="504" stroke="#30363d" stroke-width="1"/>
  <text x="54" y="516" fill="#4ade80" font-size="9">— relation  </text>
  <text x="140" y="516" fill="#60a5fa" font-size="9">blue = relation fields  </text>
  <text x="280" y="516" fill="#c084fc" font-size="9">purple = Redis-backed table</text>
  <text x="856" y="516" text-anchor="end" fill="#30363d" font-size="8">FinPay API — data-model.svg</text>
</svg>
