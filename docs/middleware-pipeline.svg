<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
    <marker id="arrow-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f87171"/>
    </marker>
  </defs>

  <rect width="900" height="640" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">FINPAY API — MIDDLEWARE PIPELINE (PHASE 6)</text>
  <line x1="80" y1="44" x2="820" y2="44" stroke="#30363d" stroke-width="1"/>

  <!-- CLIENT -->
  <rect x="330" y="56" width="240" height="36" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="79" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">INCOMING REQUEST</text>
  <line x1="450" y1="92" x2="450" y2="108" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 1: Global -->
  <rect x="140" y="108" width="620" height="90" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="158" y="124" fill="#30363d" font-size="8" letter-spacing="1">LAYER 1 — GLOBAL  (every request)</text>

  <!-- helmet -->
  <rect x="157" y="130" width="130" height="50" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="222" y="149" text-anchor="middle" fill="#e6edf3" font-size="9" font-weight="bold">helmet</text>
  <text x="222" y="163" text-anchor="middle" fill="#8b949e" font-size="8">security headers</text>
  <text x="222" y="174" text-anchor="middle" fill="#8b949e" font-size="7.5">CSP · HSTS · XSS</text>

  <!-- cors -->
  <rect x="298" y="130" width="130" height="50" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="363" y="149" text-anchor="middle" fill="#e6edf3" font-size="9" font-weight="bold">cors</text>
  <text x="363" y="163" text-anchor="middle" fill="#8b949e" font-size="8">cross-origin policy</text>
  <text x="363" y="174" text-anchor="middle" fill="#8b949e" font-size="7.5">preflight · headers</text>

  <!-- morgan -->
  <rect x="440" y="130" width="130" height="50" rx="4" fill="#161b22" stroke="#8b949e" stroke-width="1"/>
  <text x="505" y="149" text-anchor="middle" fill="#e6edf3" font-size="9" font-weight="bold">morgan</text>
  <text x="505" y="163" text-anchor="middle" fill="#8b949e" font-size="8">HTTP request log</text>
  <text x="505" y="174" text-anchor="middle" fill="#8b949e" font-size="7.5">→ Winston stream</text>

  <!-- apiLimiter -->
  <rect x="581" y="130" width="160" height="50" rx="4" fill="#161b22" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="661" y="149" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">apiLimiter</text>
  <text x="661" y="163" text-anchor="middle" fill="#8b949e" font-size="8">100 req / 15 min</text>
  <text x="661" y="174" text-anchor="middle" fill="#8b949e" font-size="7.5">Redis-backed · all /api</text>

  <line x1="450" y1="198" x2="450" y2="214" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 2: Auth Protected -->
  <rect x="140" y="214" width="620" height="90" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="158" y="230" fill="#30363d" font-size="8" letter-spacing="1">LAYER 2 — AUTH PROTECTED  (token required)</text>

  <!-- authenticate -->
  <rect x="157" y="236" width="185" height="50" rx="4" fill="#161b22" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="249" y="255" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">authenticate</text>
  <text x="249" y="269" text-anchor="middle" fill="#8b949e" font-size="8">JWT verify · req.user</text>
  <text x="249" y="280" text-anchor="middle" fill="#8b949e" font-size="7.5">checks isActive · 401/403</text>

  <!-- authLimiter -->
  <rect x="354" y="236" width="175" height="50" rx="4" fill="#161b22" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="441" y="255" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">authLimiter</text>
  <text x="441" y="269" text-anchor="middle" fill="#8b949e" font-size="8">10 req / 15 min</text>
  <text x="441" y="280" text-anchor="middle" fill="#8b949e" font-size="7.5">/auth routes only</text>

  <!-- transactionLimiter -->
  <rect x="541" y="236" width="200" height="50" rx="4" fill="#161b22" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="641" y="255" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">transactionLimiter</text>
  <text x="641" y="269" text-anchor="middle" fill="#8b949e" font-size="8">20 req / 1 min</text>
  <text x="641" y="280" text-anchor="middle" fill="#8b949e" font-size="7.5">/transactions only</text>

  <line x1="450" y1="304" x2="450" y2="320" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- LAYER 3: Fintech -->
  <rect x="140" y="320" width="620" height="90" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="158" y="336" fill="#30363d" font-size="8" letter-spacing="1">LAYER 3 — FINTECH CONTROLS  (payments)</text>

  <!-- idempotencyCheck -->
  <rect x="157" y="342" width="195" height="50" rx="4" fill="#161b22" stroke="#c084fc" stroke-width="1.2"/>
  <text x="254" y="361" text-anchor="middle" fill="#c084fc" font-size="9" font-weight="bold">idempotencyCheck</text>
  <text x="254" y="375" text-anchor="middle" fill="#8b949e" font-size="8">X-Idempotency-Key header</text>
  <text x="254" y="386" text-anchor="middle" fill="#8b949e" font-size="7.5">Redis · 24h TTL · userId scoped</text>

  <!-- cache -->
  <rect x="364" y="342" width="175" height="50" rx="4" fill="#161b22" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="451" y="361" text-anchor="middle" fill="#fbbf24" font-size="9" font-weight="bold">cache</text>
  <text x="451" y="375" text-anchor="middle" fill="#8b949e" font-size="8">Redis · configurable TTL</text>
  <text x="451" y="386" text-anchor="middle" fill="#8b949e" font-size="7.5">user-scoped keys · degrades safely</text>

  <!-- audit -->
  <rect x="551" y="342" width="190" height="50" rx="4" fill="#161b22" stroke="#60a5fa" stroke-width="1.2"/>
  <text x="646" y="361" text-anchor="middle" fill="#60a5fa" font-size="9" font-weight="bold">audit</text>
  <text x="646" y="375" text-anchor="middle" fill="#8b949e" font-size="8">fires on res finish</text>
  <text x="646" y="386" text-anchor="middle" fill="#8b949e" font-size="7.5">zero latency · never throws</text>

  <line x1="450" y1="410" x2="450" y2="426" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ROUTE HANDLER -->
  <rect x="300" y="426" width="300" height="36" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.5"/>
  <text x="450" y="449" text-anchor="middle" fill="#4ade80" font-size="11" font-weight="bold">ROUTE HANDLER</text>

  <line x1="450" y1="462" x2="450" y2="478" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- errorHandler -->
  <rect x="300" y="478" width="300" height="52" rx="6" fill="#161b22" stroke="#f87171" stroke-width="1.5"/>
  <text x="450" y="497" text-anchor="middle" fill="#f87171" font-size="11" font-weight="bold">errorHandler</text>
  <text x="450" y="513" text-anchor="middle" fill="#8b949e" font-size="8.5">P2002 · P2025 · P2003 · JWT · 500</text>
  <text x="450" y="526" text-anchor="middle" fill="#8b949e" font-size="8">catches all unhandled throws from any layer above</text>

  <!-- Error bypass arrows from layers -->
  <line x1="286" y1="370" x2="244" y2="370" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="244" y1="370" x2="244" y2="504" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="244" y1="504" x2="299" y2="504" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-r)"/>
  <text x="222" y="440" text-anchor="middle" fill="#f87171" font-size="8" transform="rotate(-90 222 440)">next(err)</text>

  <!-- Early return arrows (rate limit/auth reject) -->
  <line x1="741" y1="155" x2="820" y2="155" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="820" y1="155" x2="820" y2="524" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="820" y1="524" x2="601" y2="524" stroke="#f87171" stroke-width="1" stroke-dasharray="3,2" marker-end="url(#arrow-r)"/>
  <text x="840" y="340" text-anchor="middle" fill="#f87171" font-size="8" transform="rotate(90 840 340)">429 rate limited</text>

  <!-- Legend -->
  <line x1="80" y1="558" x2="820" y2="558" stroke="#30363d" stroke-width="1"/>
  <rect x="88" y="566" width="12" height="12" rx="2" fill="#161b22" stroke="#fbbf24" stroke-width="1"/>
  <text x="106" y="577" fill="#fbbf24" font-size="8.5">Redis-backed</text>
  <rect x="200" y="566" width="12" height="12" rx="2" fill="#161b22" stroke="#60a5fa" stroke-width="1"/>
  <text x="218" y="577" fill="#60a5fa" font-size="8.5">Auth / Audit</text>
  <rect x="312" y="566" width="12" height="12" rx="2" fill="#161b22" stroke="#c084fc" stroke-width="1"/>
  <text x="330" y="577" fill="#c084fc" font-size="8.5">Idempotency</text>
  <rect x="424" y="566" width="12" height="12" rx="2" fill="#161b22" stroke="#f87171" stroke-width="1"/>
  <text x="442" y="577" fill="#f87171" font-size="8.5">Error / Early exit</text>
  <text x="820" y="577" text-anchor="end" fill="#30363d" font-size="8">middleware-pipeline.svg</text>

  <!-- Commit label -->
  <text x="450" y="600" text-anchor="middle" fill="#8b949e" font-size="8.5" letter-spacing="1">git commit: feat: add middleware layer — auth, rate limiting, idempotency, cache, audit, error handling</text>
</svg>
