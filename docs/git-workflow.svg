<svg viewBox="0 0 900 440" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4ade80"/>
    </marker>
  </defs>

  <rect width="900" height="440" fill="#0d1117"/>
  <text x="450" y="34" text-anchor="middle" fill="#e6edf3" font-size="15" font-weight="bold" letter-spacing="2">FINPAY API — GIT COMMIT WORKFLOW (PHASES 1–3)</text>
  <line x1="80" y1="44" x2="820" y2="44" stroke="#30363d" stroke-width="1"/>

  <!-- Timeline line -->
  <line x1="100" y1="160" x2="800" y2="160" stroke="#30363d" stroke-width="2"/>

  <!-- ─── COMMIT 1 ─── -->
  <circle cx="180" cy="160" r="14" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="180" y="165" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">1</text>

  <rect x="60" y="60" width="242" height="82" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.2"/>
  <text x="181" y="78" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">chore: initialise project scaffold</text>
  <line x1="60" y1="84" x2="302" y2="84" stroke="#30363d" stroke-width="0.8"/>
  <text x="74" y="99" fill="#8b949e" font-size="8.5">+ .gitignore (created FIRST)</text>
  <text x="74" y="113" fill="#8b949e" font-size="8.5">+ package.json (engines: node &gt;=20)</text>
  <text x="74" y="127" fill="#8b949e" font-size="8.5">+ src/ directory structure (all dirs)</text>
  <text x="74" y="141" fill="#8b949e" font-size="8.5">+ prisma/ · logs/.gitkeep</text>
  <line x1="180" y1="142" x2="180" y2="146" stroke="#4ade80" stroke-width="1.5"/>

  <!-- Phase label 1 -->
  <text x="181" y="195" text-anchor="middle" fill="#8b949e" font-size="8" letter-spacing="1">PHASE 1</text>

  <!-- Steps under commit 1 -->
  <rect x="60" y="210" width="242" height="100" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="74" y="227" fill="#8b949e" font-size="8.5">1.1  mkdir finpay-api &amp;&amp; git init</text>
  <text x="74" y="241" fill="#8b949e" font-size="8.5">1.2  git config user.name / email</text>
  <text x="74" y="255" fill="#8b949e" font-size="8.5">1.3  touch .gitignore (before npm)</text>
  <text x="74" y="269" fill="#8b949e" font-size="8.5">1.4  npm init -y</text>
  <text x="74" y="283" fill="#8b949e" font-size="8.5">1.5  edit package.json scripts</text>
  <text x="74" y="297" fill="#8b949e" font-size="8.5">1.6  mkdir -p src/{all dirs}</text>

  <!-- Arrow 1 → 2 -->
  <line x1="303" y1="160" x2="447" y2="160" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── COMMIT 2 ─── -->
  <circle cx="460" cy="160" r="14" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="460" y="165" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">2</text>

  <rect x="340" y="60" width="242" height="82" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.2"/>
  <text x="461" y="78" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">chore: install deps &amp; init Prisma</text>
  <line x1="340" y1="84" x2="582" y2="84" stroke="#30363d" stroke-width="0.8"/>
  <text x="354" y="99" fill="#8b949e" font-size="8.5">+ package-lock.json</text>
  <text x="354" y="113" fill="#8b949e" font-size="8.5">+ package.json (updated)</text>
  <text x="354" y="127" fill="#8b949e" font-size="8.5">+ prisma/schema.prisma (initial)</text>
  <text x="354" y="141" fill="#8b949e" font-size="8.5">  node_modules/ NOT committed</text>
  <line x1="460" y1="142" x2="460" y2="146" stroke="#4ade80" stroke-width="1.5"/>

  <text x="461" y="195" text-anchor="middle" fill="#8b949e" font-size="8" letter-spacing="1">PHASE 2</text>

  <rect x="340" y="210" width="242" height="100" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="354" y="227" fill="#8b949e" font-size="8.5">2.1  npm install (17 packages)</text>
  <text x="354" y="241" fill="#8b949e" font-size="8.5">2.2  npm install --save-dev nodemon</text>
  <text x="354" y="255" fill="#8b949e" font-size="8.5">2.3  npx prisma init --datasource postgresql</text>
  <text x="354" y="269" fill="#8b949e" font-size="8.5">      verify .env is gitignored</text>
  <text x="354" y="283" fill="#8b949e" font-size="8.5">      git add package.json</text>
  <text x="354" y="297" fill="#8b949e" font-size="8.5">           package-lock.json schema.prisma</text>

  <!-- Arrow 2 → 3 -->
  <line x1="583" y1="160" x2="727" y2="160" stroke="#4ade80" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ─── COMMIT 3 ─── -->
  <circle cx="740" cy="160" r="14" fill="#1a3a2a" stroke="#4ade80" stroke-width="2"/>
  <text x="740" y="165" text-anchor="middle" fill="#4ade80" font-size="10" font-weight="bold">3</text>

  <rect x="620" y="60" width="242" height="82" rx="6" fill="#161b22" stroke="#4ade80" stroke-width="1.2"/>
  <text x="741" y="78" text-anchor="middle" fill="#4ade80" font-size="9" font-weight="bold">chore: Docker infra &amp; DB schema</text>
  <line x1="620" y1="84" x2="862" y2="84" stroke="#30363d" stroke-width="0.8"/>
  <text x="634" y="99" fill="#8b949e" font-size="8.5">+ docker-compose.yml</text>
  <text x="634" y="113" fill="#8b949e" font-size="8.5">+ .env.example (safe to commit)</text>
  <text x="634" y="127" fill="#8b949e" font-size="8.5">+ prisma/schema.prisma (full models)</text>
  <text x="634" y="141" fill="#8b949e" font-size="8.5">  .env NOT committed</text>
  <line x1="740" y1="142" x2="740" y2="146" stroke="#4ade80" stroke-width="1.5"/>

  <text x="741" y="195" text-anchor="middle" fill="#8b949e" font-size="8" letter-spacing="1">PHASE 3</text>

  <rect x="620" y="210" width="242" height="100" rx="6" fill="#0d1117" stroke="#30363d" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="634" y="227" fill="#8b949e" font-size="8.5">3.1  docker-compose.yml</text>
  <text x="634" y="241" fill="#8b949e" font-size="8.5">3.2  .env (secrets — gitignored)</text>
  <text x="634" y="255" fill="#8b949e" font-size="8.5">3.3  .env.example</text>
  <text x="634" y="269" fill="#8b949e" font-size="8.5">3.4  verify .env not tracked</text>
  <text x="634" y="283" fill="#8b949e" font-size="8.5">3.5  docker compose up -d</text>
  <text x="634" y="297" fill="#8b949e" font-size="8.5">3.6–3.7  schema + migrate dev</text>

  <!-- Push to GitHub label -->
  <rect x="300" y="330" width="300" height="52" rx="6" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="349" text-anchor="middle" fill="#8b949e" font-size="10" font-weight="bold">git push -u origin main</text>
  <line x1="300" y1="357" x2="600" y2="357" stroke="#30363d" stroke-width="0.6"/>
  <text x="450" y="372" text-anchor="middle" fill="#8b949e" font-size="8.5">3 commits visible · .env absent · node_modules absent</text>
  <line x1="450" y1="310" x2="450" y2="330" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="180" y1="310" x2="740" y2="310" stroke="#30363d" stroke-width="1" stroke-dasharray="3,3"/>
  <line x1="180" y1="310" x2="180" y2="315" stroke="#30363d" stroke-width="1"/>
  <line x1="740" y1="310" x2="740" y2="315" stroke="#30363d" stroke-width="1"/>

  <line x1="80" y1="420" x2="820" y2="420" stroke="#30363d" stroke-width="1"/>
  <text x="450" y="432" text-anchor="middle" fill="#30363d" font-size="8">Solid box = committed files    Dashed box = steps in that phase</text>
  <text x="862" y="432" text-anchor="end" fill="#30363d" font-size="8">git-workflow.svg</text>
</svg>
